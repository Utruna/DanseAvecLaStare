name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install ModelEngine API from secret
        env:
          MODELENGINE_JAR: ${{ secrets.MODELENGINE_JAR }}
        run: |
          echo "$MODELENGINE_JAR" | base64 -d > modelengine-api.jar
          mvn install:install-file \
            -Dfile=modelengine-api.jar \
            -DgroupId=com.ticxo.modelengine \
            -DartifactId=ModelEngine-API \
            -Dversion=4.0.9 \
            -Dpackaging=jar \
            -DgeneratePom=true

      - name: Build with Maven
        run: mvn clean package -DskipTests -Drevision=${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "DanseAvecLaStare v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          files: target/DanseAvecLaStare-${{ steps.version.outputs.VERSION }}.jar
          generate_release_notes: true
          draft: false
          prerelease: false

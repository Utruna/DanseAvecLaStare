# Strategy switch
# true = use ModelEngine when plugin is present
# false = fallback to Citizens implementation
useModelEngine: true

modelEngine:
  defaultModelId: danseur
  defaultAnimationName: dance

# Configuration des dances - Chaque style de danse est défini ici
# Ajoute une nouvelle danse sans modifier le code Java, juste la config !
dances:
  twist:
    displayName: "Twist"
    modelId: danseur
    animationName: dance
    movementType: dynamic        # static ou dynamic

  spin:
    displayName: "Spin"
    modelId: danseur
    animationName: dance
    movementType: dynamic

  disco:
    displayName: "Disco"
    modelId: danseur
    animationName: dance
    movementType: static

  moonwalk:
    displayName: "Moonwalk"
    modelId: danseur
    animationName: dance
    movementType: dynamic

  wave:
    displayName: "Wave"
    modelId: danseur
    animationName: dance
    movementType: dynamic

  dj:
    displayName: "DJ"
    modelId: dj_animation1
    animationName: dance
    movementType: dynamic
